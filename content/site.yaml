about:
  short: |
    Omeo Fan is Principal Broker at 4You Hawaii International Realty,
    offering MBA-level financial expertise and over a decade of Oahu
    real estate experience for local and international clients.
  full: |
    Omeo Fan is Principal Broker at 4You Hawaii International Realty,
    bringing an MBA in Finance and Management, a BBA in Accounting and
    Management Information Systems from the University of Hawaiʻi, and
    over twelve years of experience in Oahu sales, property management,
    and vacation rentals.

    Born and raised in Hong Kong, Omeo began his professional career as
    a teacher before coming to Honolulu for further education and hands-on
    real estate experience. Being fluent in English, Cantonese, Mandarin,
    and Hakka has proven invaluable in Honolulu's international marketplace.

    Whether you're buying your first home, selling an investment property,
    or relocating from overseas, Omeo goes the distance for you.
